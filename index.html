<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat Live</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app{
  width:360px;
  height:600px;
  background:#111827;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

header{
  background:#2563eb;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.inputs{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:5px;
}

input{
  padding:10px;
  border:none;
  outline:none;
  border-radius:8px;
}

#chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  padding:10px;
  border-radius:10px;
  max-width:75%;
  word-wrap:break-word;
}

.me{
  background:#22c55e;
  align-self:flex-end;
}

.other{
  background:#374151;
  align-self:flex-start;
}

.sendBox{
  display:flex;
  border-top:1px solid #222;
}

.sendBox input{
  flex:1;
  border-radius:0;
}

button{
  padding:10px;
  background:#2563eb;
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<header>📱 UChat Live</header>

<div class="inputs">
  <input id="me" placeholder="Your phone number">
  <input id="to" placeholder="Send to number">
</div>

<div id="chat"></div>

<div class="sendBox">
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMsg()">Send</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

// 🔥 YOUR FIREBASE CONFIG (FIXED & INTEGRATED)
const firebaseConfig = {
  apiKey: "AIzaSyCV99zLt-hvSrDVM0hJUPOL6TpxUNmXrtg",
  authDomain: "uchat-8310f.firebaseapp.com",
  databaseURL: "https://uchat-8310f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "uchat-8310f",
  storageBucket: "uchat-8310f.firebasestorage.app",
  messagingSenderId: "670431069375",
  appId: "1:670431069375:web:93f6c573359201b461320a",
  measurementId: "G-8ZPW9BBW3W"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);
const db = getDatabase(app);

window.sendMsg = function(){

  const me = document.getElementById("me").value;
  const to = document.getElementById("to").value;
  const msg = document.getElementById("msg").value;

  if(!me || !to || !msg){
    alert("Fill all fields");
    return;
  }

  const chatId = [me,to].sort().join("_");

  push(ref(db, "chats/" + chatId), {
    sender: me,
    text: msg,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

// LIVE LISTENER
let currentChat = "";

setInterval(()=>{

  const me = document.getElementById("me").value;
  const to = document.getElementById("to").value;

  if(!me || !to) return;

  const chatId = [me,to].sort().join("_");

  if(chatId !== currentChat){

    currentChat = chatId;
    document.getElementById("chat").innerHTML = "";

    onChildAdded(ref(db, "chats/" + chatId), (data)=>{

      const d = data.val();

      const div = document.createElement("div");
      div.className = "msg " + (d.sender === me ? "me" : "other");
      div.textContent = d.text;

      document.getElementById("chat").appendChild(div);

      document.getElementById("chat").scrollTop =
        document.getElementById("chat").scrollHeight;
    });
  }

},1000);

</script>

</body>
</html>
