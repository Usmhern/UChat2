<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Clone PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b141a;color:white}

/* AUTH */
#auth{
position:fixed;inset:0;
background:#0b141a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
}

input,button{
padding:10px;
width:250px;
border:none;
outline:none;
}

input{background:#202c33;color:white}
button{background:#00a884;color:white;cursor:pointer}

/* APP */
#app{display:none;height:100vh}

.tabs{
display:flex;
background:#202c33;
justify-content:space-around;
padding:10px;
}

.tab{cursor:pointer}
.active{border-bottom:2px solid #00a884}

.container{display:flex;height:90vh}

.sidebar{width:30%;background:#111b21;overflow:auto}

.user{
padding:10px;
border-bottom:1px solid #222;
cursor:pointer;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
max-width:60%;
padding:8px;
border-radius:8px;
}

.me{background:#005c4b;margin-left:auto}
.other{background:#202c33}

.input{
display:flex;
padding:10px;
background:#202c33;
gap:5px;
}

.small{font-size:11px;color:#00ff88}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
<h3>📱 WhatsApp Clone Login</h3>
<input id="phone" placeholder="+234xxxxxxxxxx">
<div id="recaptcha"></div>
<button onclick="sendOTP()">Send OTP</button>
<input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify</button>
</div>

<!-- APP -->
<div id="app">

<div class="tabs">
<div class="tab active">Chats</div>
<div class="tab">Status</div>
<div class="tab">Calls</div>
</div>

<div class="container">

<div class="sidebar" id="users"></div>

<div class="chat">

<div class="messages" id="messages"></div>

<div class="input">
<input id="msg" placeholder="Message" oninput="typing()">
<button onclick="sendMsg()">Send</button>
</div>

<div class="input">
<input type="file" id="img">
<button onclick="sendImage()">📷</button>
<button onclick="recordVoice()">🎤</button>
</div>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth, RecaptchaVerifier, signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getDatabase, ref, set, push, onValue, onChildAdded, update
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

import {
getStorage, ref as sRef, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB",
projectId: "YOUR_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

let me;
let activeUser;

/* CAPTCHA */
window.recaptchaVerifier = new RecaptchaVerifier(auth,'recaptcha',{size:'invisible'});

/* OTP */
window.sendOTP=function(){
signInWithPhoneNumber(auth,document.getElementById("phone").value,window.recaptchaVerifier)
.then(r=>window.confirmationResult=r);
}

window.verifyOTP=function(){
window.confirmationResult.confirm(document.getElementById("otp").value)
.then(res=>{
me=res.user.phoneNumber;
initApp();
});
}

/* INIT */
function initApp(){
document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="block";

set(ref(db,"users/"+me),{online:true});
}

/* USERS */
onValue(ref(db,"users"),snap=>{
let data=snap.val()||{};
let box=document.getElementById("users");
box.innerHTML="";

Object.keys(data).forEach(u=>{
if(u===me) return;

let div=document.createElement("div");
div.className="user";
div.innerHTML=u+(data[u].online?" 🟢":"");
div.onclick=()=>openChat(u);
box.appendChild(div);
});
});

/* CHAT ID */
function chatId(){
return [me,activeUser].sort().join("_");
}

/* OPEN CHAT */
window.openChat=function(u){
activeUser=u;
loadMessages();
}

/* MESSAGES */
function loadMessages(){
document.getElementById("messages").innerHTML="";

onChildAdded(ref(db,"chats/"+chatId()),snap=>{
let d=snap.val();

let div=document.createElement("div");
div.className="msg "+(d.sender===me?"me":"other");

div.innerHTML=
d.type==="image"
? `<img src="${d.text}" width="150">`
: d.type==="voice"
? `<audio controls src="${d.text}"></audio>`
: d.text;

document.getElementById("messages").appendChild(div);
});
}

/* SEND TEXT */
window.sendMsg=function(){
let text=document.getElementById("msg").value;
push(ref(db,"chats/"+chatId()),{
sender:me,
text,
type:"text",
time:Date.now()
});
document.getElementById("msg").value="";
}

/* IMAGE */
window.sendImage=async function(){
let file=document.getElementById("img").files[0];
let path="img/"+Date.now()+file.name;
let r=sRef(storage,path);
await uploadBytes(r,file);
let url=await getDownloadURL(r);

push(ref(db,"chats/"+chatId()),{
sender:me,
text:url,
type:"image",
time:Date.now()
});
}

/* VOICE */
window.recordVoice=async function(){
let stream=await navigator.mediaDevices.getUserMedia({audio:true});
let rec=new MediaRecorder(stream);
let chunks=[];

rec.ondataavailable=e=>chunks.push(e.data);

rec.onstop=async()=>{
let blob=new Blob(chunks,{type:"audio/webm"});
let path="voice/"+Date.now();
let r=sRef(storage,path);
await uploadBytes(r,blob);
let url=await getDownloadURL(r);

push(ref(db,"chats/"+chatId()),{
sender:me,
text:url,
type:"voice",
time:Date.now()
});
};

rec.start();
setTimeout(()=>rec.stop(),5000);
}

</script>

</body>
</html>
