<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat Working</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b141a;color:white}

/* LOGIN */
#login{
display:flex;flex-direction:column;
justify-content:center;align-items:center;
height:100vh;gap:10px;
}
#login input{
padding:12px;width:260px;border:none;border-radius:6px;
}
#login button{
padding:12px;width:260px;background:#00a884;border:none;color:white;
}

/* APP */
#app{display:none;height:100vh}

/* SIDEBAR */
.sidebar{
width:30%;height:100%;float:left;
background:#111b21;overflow:auto;
}
.chat-item{
padding:12px;border-bottom:1px solid #222;cursor:pointer;
}
.chat-item:hover{background:#202c33}

/* CHAT */
.chat{
width:70%;float:left;height:100%;
display:flex;flex-direction:column;
}
.messages{
flex:1;overflow:auto;padding:10px;
display:flex;flex-direction:column;
}
.msg{
padding:10px;margin:5px;border-radius:10px;max-width:70%;
}
.sent{align-self:flex-end;background:#00a884;color:black}
.received{align-self:flex-start;background:#202c33}

.input{
display:flex;padding:10px;background:#202c33;
}
.input input{flex:1;padding:10px;border:none;border-radius:20px}
.input button{
margin-left:5px;padding:10px;border:none;background:#00a884;color:white;border-radius:50%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>UChat</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login / Register</button>
</div>

<!-- APP -->
<div id="app">
<div class="sidebar" id="users"></div>

<div class="chat">
<div id="chatHeader" style="padding:10px">Select user</div>
<div class="messages" id="messages"></div>

<div class="input">
<input id="msg" placeholder="Message">
<button onclick="send()">➤</button>
<button id="recordBtn">🎤</button>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* 🔥 YOUR CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCV99zLt-hvSrDVM0hJUPOL6TpxUNmXrtg",
  authDomain: "uchat-8310f.firebaseapp.com",
  projectId: "uchat-8310f",
  storageBucket: "uchat-8310f.firebasestorage.app",
  messagingSenderId: "670431069375",
  appId: "1:670431069375:web:93f6c573359201b461320a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let me=null, currentChat=null;

/* 🔥 AUTH STATE */
onAuthStateChanged(auth,(user)=>{
if(user){
me = user.email;
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
loadUsers();
}
});

/* LOGIN */
window.login = async ()=>{
let emailVal = email.value.trim();
let passVal = password.value.trim();

if(!emailVal || !passVal){
alert("Enter email & password");
return;
}

try{
await signInWithEmailAndPassword(auth,emailVal,passVal);
}catch(err){
try{
await createUserWithEmailAndPassword(auth,emailVal,passVal);
}catch(e){
alert(e.message);
}
}
};

/* USERS */
function loadUsers(){
onSnapshot(collection(db,"users"),snap=>{
users.innerHTML="";
snap.forEach(u=>{
if(u.id===me) return;

let div=document.createElement("div");
div.className="chat-item";
div.innerText=u.id;
div.onclick=()=>openChat(u.id);

users.appendChild(div);
});
});

/* ensure user exists */
setDoc(doc(db,"users",me),{online:true});
}

/* OPEN CHAT */
function openChat(user){
currentChat=user;
chatHeader.innerText=user;

const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,snap=>{
messages.innerHTML="";

snap.forEach(doc=>{
let m=doc.data();

if(
(m.from===me && m.to===user) ||
(m.from===user && m.to===me)
){
let div=document.createElement("div");
div.className="msg "+(m.from===me?"sent":"received");

let content=m.text||"";

if(m.audio){
content+=`<br><audio controls src="${m.audio}"></audio>`;
}

div.innerHTML=content;
messages.appendChild(div);
}
});

messages.scrollTop=messages.scrollHeight;
});
}

/* SEND */
window.send = async ()=>{
if(!currentChat || !msg.value) return;

await addDoc(collection(db,"messages"),{
text:msg.value,
from:me,
to:currentChat,
time:Date.now()
});

msg.value="";
};

/* 🎤 VOICE */
let recorder, chunks=[], recording=false;

recordBtn.onclick = async ()=>{
if(!currentChat) return;

if(!recording){
let stream = await navigator.mediaDevices.getUserMedia({audio:true});
recorder = new MediaRecorder(stream);

chunks=[];

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=async ()=>{
let blob=new Blob(chunks,{type:"audio/webm"});
let r=ref(storage,"voice/"+Date.now());

await uploadBytes(r,blob);
let url=await getDownloadURL(r);

await addDoc(collection(db,"messages"),{
from:me,
to:currentChat,
audio:url,
time:Date.now()
});
};

recorder.start();
recordBtn.innerText="⏹";
recording=true;

}else{
recorder.stop();
recordBtn.innerText="🎤";
recording=false;
}
};
</script>

</body>
</html>
