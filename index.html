<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp</title>

<style>
body{margin:0;font-family:Arial;background:#0b141a;color:white}

/* AUTH */
#auth{
position:fixed;inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
background:#0b141a;
}

input,button{
width:260px;
padding:10px;
border:none;
outline:none;
border-radius:5px;
}

input{background:#202c33;color:white}
button{background:#00a884;color:white;cursor:pointer}

/* APP */
#app{display:none;height:100vh;flex-direction:row}

.sidebar{
width:30%;
background:#111b21;
overflow:auto;
}

.user{
padding:12px;
border-bottom:1px solid #222;
cursor:pointer;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#202c33;
padding:12px;
font-weight:bold;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
max-width:60%;
padding:8px;
border-radius:8px;
}

.me{background:#005c4b;margin-left:auto}
.other{background:#202c33}

.input{
display:flex;
padding:10px;
background:#202c33;
gap:5px;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
<h3>📱 UChat Login</h3>

<input id="phone" placeholder="+234XXXXXXXXXX">

<div id="recaptcha"></div>

<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify OTP</button>
</div>

<!-- APP -->
<div id="app">
<div class="sidebar" id="users"></div>

<div class="chat">
<div class="header" id="chatTitle">Chats</div>
<div class="messages" id="messages"></div>

<div class="input">
<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
</div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyCV99zLt-hvSrDVM0hJUPOL6TpxUNmXrtg",
authDomain: "uchat-8310f.firebaseapp.com",
databaseURL: "https://uchat-8310f-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "uchat-8310f",
storageBucket: "uchat-8310f.firebasestorage.app",
messagingSenderId: "670431069375",
appId: "1:670431069375:web:93f6c573359201b461320a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let me;
let activeUser;
let confirmationResult;

/* 🔐 FIXED CAPTCHA INIT */
window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha", {
size: "invisible"
});

window.recaptchaVerifier.render();

/* ================= OTP ================= */

/* SEND OTP */
window.sendOTP = function () {
const phone = document.getElementById("phone").value;

if (!phone.startsWith("+")) {
alert("Use format +234XXXXXXXXXX");
return;
}

signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
.then((result) => {
confirmationResult = result;
alert("OTP Sent Successfully");
})
.catch((error) => {
console.log(error);
alert("OTP Failed: " + error.message);
});
};

/* VERIFY OTP */
window.verifyOTP = function () {
const code = document.getElementById("otp").value;

confirmationResult.confirm(code)
.then((result) => {
me = result.user.phoneNumber;

startApp();
})
.catch((error) => {
alert("Wrong OTP");
console.log(error);
});
};

/* ================= APP ================= */

function startApp() {
document.getElementById("auth").style.display = "none";
document.getElementById("app").style.display = "flex";

/* set user online */
set(ref(db, "users/" + me), {
online: true
});

/* load users */
onValue(ref(db, "users"), (snap) => {
const data = snap.val() || {};
const box = document.getElementById("users");
box.innerHTML = "";

Object.keys(data).forEach((u) => {
if (u === me) return;

const div = document.createElement("div");
div.className = "user";
div.innerText = u + (data[u].online ? " 🟢" : "");
div.onclick = () => openChat(u);

box.appendChild(div);
});
});
}

/* ================= CHAT ================= */

function chatId() {
return [me, activeUser].sort().join("_");
}

window.openChat = function (u) {
activeUser = u;
document.getElementById("chatTitle").innerText = u;

loadMessages();
};

function loadMessages() {
document.getElementById("messages").innerHTML = "";

onChildAdded(ref(db, "chats/" + chatId()), (snap) => {
const d = snap.val();

const div = document.createElement("div");
div.className = "msg " + (d.sender === me ? "me" : "other");
div.innerText = d.text;

document.getElementById("messages").appendChild(div);
});
}

/* SEND MESSAGE */
window.sendMsg = function () {
const text = document.getElementById("msg").value;
if (!text || !activeUser) return;

push(ref(db, "chats/" + chatId()), {
sender: me,
text,
time: Date.now()
});

document.getElementById("msg").value = "";
};

</script>

</body>
</html>
