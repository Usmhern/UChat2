<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat Final</title>

<style>
:root{
--bg:#0b141a;
--panel:#111b21;
--chat:#202c33;
--green:#00a884;
--text:#e9edef;
--sub:#8696a0;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:var(--bg);color:var(--text);height:100vh}

/* LOGIN */
#login{
display:flex;flex-direction:column;
justify-content:center;align-items:center;
height:100vh;gap:10px;
}
#login input{
padding:12px;width:260px;border:none;border-radius:6px;
}
#login button{
padding:12px;width:260px;background:var(--green);
border:none;color:white;cursor:pointer;
}

/* APP */
#app{display:none;height:100vh}

/* SIDEBAR */
.sidebar{
width:30%;height:100%;
background:var(--panel);
float:left;overflow:auto;
border-right:1px solid #1f2c33;
}
.chat-item{
padding:12px;border-bottom:1px solid #1f2c33;
cursor:pointer;
}
.chat-item:hover{background:var(--chat)}
.chat-item small{color:var(--sub)}

/* CHAT */
.chat{
width:70%;height:100%;
float:left;
display:flex;flex-direction:column;
}
.header{
padding:12px;background:var(--panel);
border-bottom:1px solid #1f2c33;
}
.messages{
flex:1;overflow:auto;padding:10px;
display:flex;flex-direction:column;
}
.msg{
padding:10px;margin:5px;
border-radius:8px;max-width:70%;
}
.sent{align-self:flex-end;background:var(--green);color:black}
.received{align-self:flex-start;background:var(--chat)}

.meta{font-size:10px;margin-top:5px;text-align:right}

/* INPUT */
.input{
display:flex;padding:10px;background:var(--panel);gap:5px
}
.input input[type=text]{
flex:1;padding:10px;border:none;border-radius:20px
}
.input button{
padding:10px;border:none;background:var(--green);
color:white;border-radius:50%;cursor:pointer;
}

#typing{font-size:12px;color:var(--sub);padding-left:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>UChat</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login / Register</button>
</div>

<!-- APP -->
<div id="app">
<div class="sidebar" id="users"></div>

<div class="chat">
<div class="header" id="chatHeader">Select a user</div>
<div id="typing"></div>
<div class="messages" id="messages"></div>

<div class="input">
<input type="text" id="msg" placeholder="Type a message">
<input type="file" id="fileInput">
<button onclick="send()">➤</button>
<button id="recordBtn">🎤</button>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore, collection, addDoc, onSnapshot, query, orderBy,
doc, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCV99zLt-hvSrDVM0hJUPOL6TpxUNmXrtg",
  authDomain: "uchat-8310f.firebaseapp.com",
  projectId: "uchat-8310f",
  storageBucket: "uchat-8310f.firebasestorage.app",
  messagingSenderId: "670431069375",
  appId: "1:670431069375:web:93f6c573359201b461320a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let me=null,currentChat=null;

/* LOGIN */
window.login = async ()=>{
let emailVal = email.value.trim();
let passVal = password.value.trim();

if(!emailVal || !passVal){
alert("Enter email & password");
return;
}

try{
await signInWithEmailAndPassword(auth,emailVal,passVal);
}catch{
await createUserWithEmailAndPassword(auth,emailVal,passVal);
}

me = auth.currentUser.email;

/* SAVE USER */
await setDoc(doc(db,"users",me),{
email:me,
online:true,
lastSeen:Date.now()
});

login.style.display="none";
app.style.display="block";

loadUsers();
};

/* LOAD USERS */
function loadUsers(){
onSnapshot(collection(db,"users"),snapshot=>{
users.innerHTML="";

snapshot.forEach(docSnap=>{
let data = docSnap.data();
if(data.email===me) return;

let div=document.createElement("div");
div.className="chat-item";

div.innerHTML=`
<b>${data.email}</b><br>
<small>${data.online?"online":"offline"}</small>
`;

div.onclick=()=>openChat(data.email);

users.appendChild(div);
});
});
}

/* OPEN CHAT */
function openChat(user){
currentChat=user;
chatHeader.innerText=user;

const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,snap=>{
messages.innerHTML="";

snap.forEach(async docSnap=>{
let m=docSnap.data();

if(
(m.from===me && m.to===user) ||
(m.from===user && m.to===me)
){
let div=document.createElement("div");
div.className="msg "+(m.from===me?"sent":"received");

let content=m.text||"";

if(m.image){
content+=`<br><img src="${m.image}" width="150">`;
}
if(m.audio){
content+=`<br><audio controls src="${m.audio}"></audio>`;
}

div.innerHTML=content+`
<div class="meta">
${new Date(m.time).toLocaleTimeString()}
${m.from===me ? (m.seen?" ✔✔":" ✔"):""}
</div>`;

messages.appendChild(div);

/* seen */
if(m.to===me && !m.seen){
await updateDoc(doc(db,"messages",docSnap.id),{seen:true});
}
}
});

messages.scrollTop=messages.scrollHeight;
});
}

/* SEND */
window.send = async ()=>{
if(!currentChat) return;

let text = msg.value;
let file = fileInput.files[0];

let data = {
from:me,
to:currentChat,
time:Date.now(),
seen:false
};

if(text) data.text=text;

if(file){
let r = ref(storage,"files/"+Date.now());
await uploadBytes(r,file);
data.image = await getDownloadURL(r);
}

await addDoc(collection(db,"messages"),data);

msg.value="";
fileInput.value="";
};

/* VOICE */
let recorder,chunks=[],recording=false;

recordBtn.onclick = async ()=>{
if(!currentChat) return;

if(!recording){
let stream = await navigator.mediaDevices.getUserMedia({audio:true});
recorder = new MediaRecorder(stream);

chunks=[];

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=async ()=>{
let blob=new Blob(chunks,{type:"audio/webm"});
let r=ref(storage,"voice/"+Date.now());

await uploadBytes(r,blob);
let url=await getDownloadURL(r);

await addDoc(collection(db,"messages"),{
from:me,
to:currentChat,
audio:url,
time:Date.now(),
seen:false
});
};

recorder.start();
recordBtn.innerText="⏹";
recording=true;

}else{
recorder.stop();
recordBtn.innerText="🎤";
recording=false;
}
};

/* TYPING */
msg.oninput=()=>{
if(!currentChat) return;

setDoc(doc(db,"typing",me),{
to:currentChat,typing:true
});

setTimeout(()=>{
setDoc(doc(db,"typing",me),{typing:false});
},1000);
};

onSnapshot(collection(db,"typing"),snap=>{
let txt="";
snap.forEach(t=>{
let d=t.data();
if(t.id===currentChat && d.typing){
txt="typing...";
}
});
typing.innerText=txt;
});
</script>

</body>
</html>
