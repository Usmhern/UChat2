<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Clone Password Login</title>

<style>
body{margin:0;font-family:Arial;background:#0b141a;color:white}

/* AUTH */
#auth{
position:fixed;inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
background:#0b141a;
}

input,button{
width:260px;
padding:10px;
border:none;
outline:none;
border-radius:5px;
}

input{background:#202c33;color:white}
button{background:#00a884;color:white;cursor:pointer}

/* APP */
#app{display:none;height:100vh;flex-direction:row}

.sidebar{
width:30%;
background:#111b21;
overflow:auto;
}

.user{
padding:12px;
border-bottom:1px solid #222;
cursor:pointer;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#202c33;
padding:12px;
font-weight:bold;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
max-width:60%;
padding:8px;
border-radius:8px;
}

.me{background:#005c4b;margin-left:auto}
.other{background:#202c33}

.input{
display:flex;
padding:10px;
background:#202c33;
gap:5px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
<h3>🔐 Login / Register</h3>

<input id="phone" placeholder="Phone Number (username)">
<input id="pass" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar" id="users"></div>

<div class="chat">

<div class="header" id="chatTitle">Chats</div>
<div class="messages" id="messages"></div>

<div class="input">
<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyCV99zLt-hvSrDVM0hJUPOL6TpxUNmXrtg",
authDomain: "uchat-8310f.firebaseapp.com",
databaseURL: "https://uchat-8310f-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "uchat-8310f",
storageBucket: "uchat-8310f.firebasestorage.app",
messagingSenderId: "670431069375",
appId: "1:670431069375:web:93f6c573359201b461320a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let me;
let activeUser;

/* ================= AUTH ================= */

window.register = function () {
const phone = document.getElementById("phone").value;
const pass = document.getElementById("pass").value;

createUserWithEmailAndPassword(auth, phone + "@chat.com", pass)
.then((user) => {
me = phone;
startApp();
});
};

window.login = function () {
const phone = document.getElementById("phone").value;
const pass = document.getElementById("pass").value;

signInWithEmailAndPassword(auth, phone + "@chat.com", pass)
.then((user) => {
me = phone;
startApp();
});
};

/* ================= APP ================= */

function startApp(){
document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="flex";

/* online */
set(ref(db,"users/"+me),{online:true});

/* load users */
onValue(ref(db,"users"), snap=>{
let data=snap.val()||{};
let box=document.getElementById("users");
box.innerHTML="";

Object.keys(data).forEach(u=>{
if(u===me) return;

let div=document.createElement("div");
div.className="user";
div.innerText=u+(data[u].online?" 🟢":"");
div.onclick=()=>openChat(u);

box.appendChild(div);
});
});
}

/* ================= CHAT ================= */

function chatId(){
return [me,activeUser].sort().join("_");
}

window.openChat=function(u){
activeUser=u;
document.getElementById("chatTitle")="Chat: "+u;

loadMessages();
};

function loadMessages(){
document.getElementById("messages").innerHTML="";

onChildAdded(ref(db,"chats/"+chatId()), snap=>{
let d=snap.val();

let div=document.createElement("div");
div.className="msg "+(d.sender===me?"me":"other");
div.innerText=d.text;

document.getElementById("messages").appendChild(div);
});
}

/* SEND */
window.sendMsg=function(){
let text=document.getElementById("msg").value;
if(!text||!activeUser)return;

push(ref(db,"chats/"+chatId()),{
sender:me,
text,
time:Date.now()
});

document.getElementById("msg").value="";
};

</script>

</body>
</html>
