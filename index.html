<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp FIXED PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:white;
}

/* LOGIN */
#auth{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
background:#0b141a;
}

input,button{
width:260px;
padding:10px;
border:none;
outline:none;
border-radius:6px;
}

input{background:#202c33;color:white}
button{background:#00a884;color:white;cursor:pointer}

/* APP */
#app{
display:none;
height:100vh;
}

.container{
display:flex;
height:100%;
}

/* USERS */
.sidebar{
width:30%;
background:#111b21;
overflow:auto;
}

.user{
padding:12px;
border-bottom:1px solid #222;
cursor:pointer;
}

.user:hover{background:#1f2c33}

/* CHAT */
.chat{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#202c33;
padding:12px;
font-weight:bold;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
max-width:70%;
padding:10px;
border-radius:10px;
word-wrap:break-word;
}

.me{
background:#005c4b;
align-self:flex-end;
}

.other{
background:#202c33;
align-self:flex-start;
}

.input{
display:flex;
padding:10px;
background:#202c33;
gap:5px;
}

.input input{
flex:1;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
<h3>🔐 Login</h3>
<input id="user" placeholder="Enter username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">
<div class="container">

<div class="sidebar" id="users"></div>

<div class="chat">

<div class="header" id="chatTitle">Select User</div>

<div class="messages" id="messages"></div>

<div class="input">
<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
</div>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded,
off
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB",
projectId: "YOUR_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let me = null;
let activeUser = null;
let chatRef = null;

/* ================= LOGIN ================= */

window.login = function () {
const user = document.getElementById("user").value;
const pass = document.getElementById("pass").value;

/* fake email system (stable for chat apps) */
signInWithEmailAndPassword(
getAuth(app),
user + "@chat.com",
pass
).then(() => {

me = user;

document.getElementById("auth").style.display = "none";
document.getElementById("app").style.display = "block";

/* set online */
set(ref(db,"users/"+me),{
online:true,
lastSeen:Date.now()
});

loadUsers();

}).catch(err=>{
alert("Login failed: " + err.message);
});
};

/* ================= USERS ================= */

function loadUsers(){
onValue(ref(db,"users"), snap=>{
const data = snap.val() || {};
const box = document.getElementById("users");

box.innerHTML="";

Object.keys(data).forEach(u=>{
if(u===me) return;

let div=document.createElement("div");
div.className="user";
div.innerText=u + (data[u].online ? " 🟢" : "");

div.onclick=()=>openChat(u);

box.appendChild(div);
});
});
}

/* ================= CHAT ================= */

function chatId(){
return [me, activeUser].sort().join("_");
}

/* OPEN CHAT */
window.openChat = function (u) {

activeUser = u;

document.getElementById("chatTitle").innerText = "Chat with " + u;

document.getElementById("messages").innerHTML = "";

/* remove old listener */
if(chatRef) off(chatRef);

chatRef = ref(db,"chats/"+chatId());

onChildAdded(chatRef,(snap)=>{
const d = snap.val();

let div = document.createElement("div");
div.className = "msg " + (d.sender===me?"me":"other");
div.innerText = d.text;

document.getElementById("messages").appendChild(div);

document.getElementById("messages").scrollTop =
document.getElementById("messages").scrollHeight;
});

};

/* ================= SEND ================= */

window.sendMsg = function () {
const text = document.getElementById("msg").value;

if(!text || !activeUser) return;

push(ref(db,"chats/"+chatId()),{
sender: me,
text: text,
time: Date.now()
});

document.getElementById("msg").value = "";
};

</script>

</body>
</html>
