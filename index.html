<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UChat Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#111;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
background:#111;
color:#fff;
}

input{
padding:12px;
border-radius:25px;
border:none;
width:250px;
outline:none;
}

button{
padding:12px;
border:none;
border-radius:25px;
background:#25D366;
color:#fff;
width:250px;
}

/* APP */
#app{
display:none;
height:100vh;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:35%;
background:#111;
color:#fff;
border-right:1px solid #222;
overflow:auto;
}

.user{
padding:12px;
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid #222;
cursor:pointer;
}

.user img{
width:45px;height:45px;border-radius:50%;
}

.online-dot{
width:10px;height:10px;border-radius:50%;
background:#25D366;
margin-left:auto;
}

.offline-dot{
width:10px;height:10px;border-radius:50%;
background:red;
margin-left:auto;
}

/* CHAT */
.chat{
flex:1;
display:flex;
flex-direction:column;
}

header{
background:#075E54;
color:#fff;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.messages{
flex:1;
padding:10px;
background:#ece5dd;
overflow:auto;
}

.msg{
padding:8px;
border-radius:10px;
margin:5px;
max-width:70%;
}

.me{
background:#dcf8c6;
margin-left:auto;
}

.them{
background:#fff;
}

/* INPUT */
.footer{
display:flex;
padding:10px;
gap:5px;
background:#fff;
}

.footer input{
flex:1;
border-radius:20px;
border:1px solid #ccc;
}

.send{
background:#075E54;
color:#fff;
border:none;
border-radius:50%;
width:45px;height:45px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>UChat</h2>
<input id="phone" placeholder="Phone number">
<input id="name" placeholder="Your name">
<input type="file" id="photo">
<button onclick="register()">Register</button>
</div>

<!-- APP -->
<div id="app">

<!-- USERS -->
<div class="sidebar" id="users"></div>

<!-- CHAT -->
<div class="chat">

<header id="chatHeader">Select a chat</header>

<div class="messages" id="messages"></div>

<div class="footer">
<input id="msg" placeholder="Message">
<button class="send" onclick="send()">➤</button>
</div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC92Yqng7OXblKO7WHwrnW9obXj4qiq1eo",
  authDomain: "toonz-70b08.firebaseapp.com",
  projectId: "toonz-70b08",
  storageBucket: "toonz-70b08.appspot.com",
  messagingSenderId: "1007180452941",
  appId: "1:1007180452941:web:195aa7a4e458550425b804"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

let me=null;
let active=null;

/* REGISTER */
async function register(){

const phone=document.getElementById("phone").value.trim();
const name=document.getElementById("name").value.trim();
const file=document.getElementById("photo").files[0];

if(!phone||!name){
alert("Enter phone and name");
return;
}

try{

let url="";

if(file){
const ref=storage.ref("profiles/"+phone);
await ref.put(file);
url=await ref.getDownloadURL();
}

await db.collection("users").doc(phone).set({
name,phone,photo:url,lastSeen:Date.now()
});

me=phone;

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";

loadUsers();
startPresence();

}catch(e){
alert(e.message);
}
}

/* USERS */
function loadUsers(){

db.collection("users").onSnapshot(snap=>{

let html="";

snap.forEach(doc=>{
const u=doc.data();
if(u.phone===me) return;

const online=(Date.now()-u.lastSeen)<5000;

html+=`
<div class="user" onclick="openChat('${u.phone}','${u.name}')">
<img src="${u.photo||''}">
<div>${u.name}</div>
<div class="${online?'online-dot':'offline-dot'}"></div>
</div>`;
});

document.getElementById("users").innerHTML=html;
});
}

/* OPEN CHAT */
function openChat(id,name){

active=id;
document.getElementById("chatHeader").innerText=name;

db.collection("chats")
.orderBy("time")
.onSnapshot(snap=>{

let html="";

snap.forEach(doc=>{
const m=doc.data();

if(
(m.from===me&&m.to===active)||
(m.from===active&&m.to===me)
){
html+=`
<div class="msg ${m.from===me?'me':'them'}">
${m.text}
</div>`;
}
});

document.getElementById("messages").innerHTML=html;
});
}

/* SEND */
function send(){

const text=document.getElementById("msg").value;

if(!text||!active) return;

db.collection("chats").add({
from:me,
to:active,
text,
time:Date.now()
});

document.getElementById("msg").value="";
}

/* PRESENCE */
function startPresence(){
setInterval(()=>{
if(me){
db.collection("users").doc(me).update({
lastSeen:Date.now()
});
}
},2000);
}
</script>

</body>
</html>
