<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat Pro</title>

<style>
:root{
--bg:#0b141a;
--panel:#111b21;
--chat:#202c33;
--green:#00a884;
--text:#e9edef;
--sub:#8696a0;
--border:#1f2c33;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}

body{background:var(--bg);color:var(--text);height:100vh}

/* LOGIN */
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
}
#login h1{margin-bottom:10px}
#login input{
width:280px;
padding:12px;
border:none;
border-radius:8px;
background:#1c2730;
color:white;
}
#login button{
width:280px;
padding:12px;
border:none;
border-radius:8px;
background:var(--green);
color:white;
cursor:pointer;
font-weight:bold;
}

/* APP LAYOUT */
#app{
display:none;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:30%;
height:100%;
float:left;
background:var(--panel);
border-right:1px solid var(--border);
overflow:auto;
}

.user{
padding:12px;
border-bottom:1px solid var(--border);
cursor:pointer;
transition:.2s;
}
.user:hover{background:var(--chat)}
.user small{color:var(--sub)}

/* CHAT */
.chat{
width:70%;
height:100%;
float:left;
display:flex;
flex-direction:column;
}

.header{
padding:12px;
background:var(--panel);
border-bottom:1px solid var(--border);
font-weight:bold;
}

.messages{
flex:1;
padding:10px;
overflow:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
max-width:70%;
padding:10px;
border-radius:10px;
font-size:14px;
}

.sent{
align-self:flex-end;
background:var(--green);
color:black;
}

.received{
align-self:flex-start;
background:var(--chat);
}

.meta{
font-size:10px;
margin-top:4px;
text-align:right;
color:#111;
opacity:.7;
}

/* INPUT */
.input{
display:flex;
gap:6px;
padding:10px;
background:var(--panel);
border-top:1px solid var(--border);
}

.input input[type=text]{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#1c2730;
color:white;
}

.input button{
padding:10px 14px;
border:none;
border-radius:50%;
background:var(--green);
cursor:pointer;
color:white;
}

#typing{
font-size:12px;
padding-left:10px;
color:var(--sub);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h1>UChat Pro</h1>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="handleLogin()">Login / Register</button>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar" id="users"></div>

<div class="chat">
<div class="header" id="chatHeader">Select a chat</div>
<div id="typing"></div>
<div class="messages" id="messages"></div>

<div class="input">
<input type="text" id="msg" placeholder="Message...">
<input type="file" id="file">
<button onclick="send()">➤</button>
<button id="recordBtn">🎤</button>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
setDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCV99zLt-hvSrDVM0hJUPOL6TpxUNmXrtg",
authDomain: "uchat-8310f.firebaseapp.com",
projectId: "uchat-8310f",
storageBucket: "uchat-8310f.firebasestorage.app",
messagingSenderId: "670431069375",
appId: "1:670431069375:web:93f6c573359201b461320a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* DOM */
const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");
const usersDiv = document.getElementById("users");
const msg = document.getElementById("msg");
const file = document.getElementById("file");
const messages = document.getElementById("messages");
const chatHeader = document.getElementById("chatHeader");

let me = null;
let currentChat = null;

/* LOGIN */
window.handleLogin = async () => {
try {
const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;

try {
await signInWithEmailAndPassword(auth, email, pass);
} catch {
await createUserWithEmailAndPassword(auth, email, pass);
}
} catch (e) {
alert(e.message);
}
};

/* AUTH STATE (FIXED) */
onAuthStateChanged(auth, async (user) => {
if (user) {
me = user.email;

await setDoc(doc(db,"users",me),{
email:me,
online:true,
lastSeen:Date.now()
},{merge:true});

loginDiv.style.display="none";
appDiv.style.display="block";

loadUsers();
} else {
loginDiv.style.display="flex";
appDiv.style.display="none";
}
});

/* USERS */
function loadUsers(){
onSnapshot(collection(db,"users"),snap=>{
usersDiv.innerHTML="";

snap.forEach(u=>{
let d=u.data();
if(d.email===me) return;

let div=document.createElement("div");
div.className="user";
div.innerHTML=`<b>${d.email}</b><br><small>${d.online?"online":"offline"}</small>`;
div.onclick=()=>openChat(d.email);
usersDiv.appendChild(div);
});
});
}

/* OPEN CHAT */
function openChat(user){
currentChat=user;
chatHeader.innerText=user;

const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,snap=>{
messages.innerHTML="";

snap.forEach(async m=>{
let d=m.data();

if((d.from===me&&d.to===user)||(d.from===user&&d.to===me)){

let div=document.createElement("div");
div.className="msg "+(d.from===me?"sent":"received");

let content=d.text||"";
if(d.image) content+=`<br><img src="${d.image}" width="160">`;
if(d.audio) content+=`<br><audio controls src="${d.audio}"></audio>`;

div.innerHTML=content+`
<div class="meta">${new Date(d.time).toLocaleTimeString()}</div>
`;

messages.appendChild(div);

if(d.to===me && !d.seen){
await updateDoc(doc(db,"messages",m.id),{seen:true});
}
}
});

messages.scrollTop=messages.scrollHeight;
});
}

/* SEND */
window.send = async () => {
if(!currentChat) return;

let text = msg.value;
let f = file.files[0];

let data = {
from:me,
to:currentChat,
time:Date.now(),
seen:false
};

if(text) data.text=text;

if(f){
let r = ref(storage,"files/"+Date.now());
await uploadBytes(r,f);
data.image = await getDownloadURL(r);
}

await addDoc(collection(db,"messages"),data);

msg.value="";
file.value="";
};
</script>

</body>
</html>
