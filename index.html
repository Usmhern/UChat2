<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat Pro Max</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b141a;
color:#e9edef;
}

#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
}

#login input{
width:260px;
padding:12px;
border:none;
border-radius:8px;
background:#1c2730;
color:white;
}

#login button{
width:260px;
padding:12px;
border:none;
border-radius:8px;
background:#00a884;
color:white;
font-weight:bold;
cursor:pointer;
}

#app{
display:none;
height:100vh;
}

.sidebar{
width:30%;
float:left;
height:100%;
background:#111b21;
overflow:auto;
border-right:1px solid #1f2c33;
}

.user{
padding:12px;
border-bottom:1px solid #1f2c33;
cursor:pointer;
}
.user:hover{background:#202c33}

.chat{
width:70%;
float:left;
height:100%;
display:flex;
flex-direction:column;
}

.header{
padding:12px;
background:#111b21;
border-bottom:1px solid #1f2c33;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
padding:10px;
border-radius:10px;
max-width:70%;
}

.sent{align-self:flex-end;background:#00a884;color:black}
.received{align-self:flex-start;background:#202c33}

.input{
display:flex;
padding:10px;
gap:6px;
background:#111b21;
}

.input input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#1c2730;
color:white;
}

.input button{
padding:10px 14px;
border-radius:50%;
border:none;
background:#00a884;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>UChat</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="handleLogin()">Login / Register</button>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar" id="users"></div>

<div class="chat">
<div class="header" id="chatHeader">Select user</div>
<div class="messages" id="messages"></div>

<div class="input">
<input id="msg" placeholder="Message...">
<input type="file" id="file">
<button onclick="send()">➤</button>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
setDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCV99zLt-hvSrDVM0hJUPOL6TpxUNmXrtg",
authDomain: "uchat-8310f.firebaseapp.com",
projectId: "uchat-8310f",
storageBucket: "uchat-8310f.firebasestorage.app",
messagingSenderId: "670431069375",
appId: "1:670431069375:web:93f6c573359201b461320a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* UI */
const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");

const usersDiv = document.getElementById("users");
const messagesDiv = document.getElementById("messages");
const chatHeader = document.getElementById("chatHeader");

let me = null;
let currentChat = null;

/* LOGIN */
window.handleLogin = async () => {
const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;

try {
await signInWithEmailAndPassword(auth, email, pass);
} catch {
await createUserWithEmailAndPassword(auth, email, pass);
}
};

/* AUTH STATE (MOST IMPORTANT FIX) */
onAuthStateChanged(auth, async (user) => {
if (user) {
me = user.email;

/* save user */
await setDoc(doc(db,"users",me),{
email:me,
online:true,
time:Date.now()
},{merge:true});

/* SWITCH UI */
loginDiv.style.display="none";
appDiv.style.display="block";

loadUsers();

} else {
loginDiv.style.display="flex";
appDiv.style.display="none";
}
});

/* USERS */
function loadUsers(){
onSnapshot(collection(db,"users"),snap=>{
usersDiv.innerHTML="";

snap.forEach(u=>{
let d=u.data();
if(d.email===me) return;

let div=document.createElement("div");
div.className="user";
div.innerHTML=d.email;

div.onclick=()=>openChat(d.email);
usersDiv.appendChild(div);
});
});
}

/* CHAT */
function openChat(user){
currentChat=user;
chatHeader.innerText=user;

const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,snap=>{
messagesDiv.innerHTML="";

snap.forEach(async m=>{
let d=m.data();

if((d.from===me && d.to===user)||(d.from===user && d.to===me)){

let div=document.createElement("div");
div.className="msg "+(d.from===me?"sent":"received");

let content=d.text||"";
if(d.image) content+=`<br><img src="${d.image}" width="150">`;

div.innerHTML=content;
messagesDiv.appendChild(div);
}
});

messagesDiv.scrollTop=messagesDiv.scrollHeight;
});
}

/* SEND */
window.send = async () => {
if(!currentChat) return;

let text = document.getElementById("msg").value;
let file = document.getElementById("file").files[0];

let data = {
from:me,
to:currentChat,
time:Date.now()
};

if(text) data.text=text;

if(file){
let r = ref(storage,"files/"+Date.now());
await uploadBytes(r,file);
data.image = await getDownloadURL(r);
}

await addDoc(collection(db,"messages"),data);

document.getElementById("msg").value="";
document.getElementById("file").value="";
};
</script>

</body>
</html>
