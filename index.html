<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UChat Pro</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;display:flex;justify-content:center}
.app{width:380px;height:650px;background:#111827;display:flex;flex-direction:column;border-radius:12px;overflow:hidden}

header{background:#2563eb;padding:12px;text-align:center;font-weight:bold}

.users{font-size:12px;padding:5px;color:#a5b4fc}

input,button{padding:10px;border:none;outline:none}

.inputs{display:flex;flex-direction:column;gap:5px;padding:8px}

#chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}

.msg{padding:8px;border-radius:10px;max-width:75%}
.me{background:#22c55e;align-self:flex-end}
.other{background:#374151}

.footer{display:flex;gap:5px;padding:5px}
.footer input{flex:1}

button{background:#2563eb;color:white;cursor:pointer}
.small{font-size:11px;color:#93c5fd}
</style>
</head>

<body>

<div class="app">

<header>📱 UChat PRO</header>

<div class="inputs">
  <input id="phone" placeholder="Enter phone number (login)">
  <button onclick="login()">Login</button>
  <div class="small" id="status">Offline</div>
</div>

<div class="users" id="onlineUsers">Online: 0</div>

<div id="chat"></div>

<div class="footer">
  <input id="msg" placeholder="Message">
  <button onclick="sendMsg()">Send</button>
</div>

<div class="footer">
  <input type="file" id="img">
  <button onclick="sendImage()">📷</button>
  <button onclick="startVoice()">🎤</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCV99zLt-hvSrDVM0hJUPOL6TpxUNmXrtg",
  authDomain: "uchat-8310f.firebaseapp.com",
  databaseURL: "https://uchat-8310f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "uchat-8310f",
  storageBucket: "uchat-8310f.firebasestorage.app",
  messagingSenderId: "670431069375",
  appId: "1:670431069375:web:93f6c573359201b461320a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let me = "";
let currentChat = "global";

// LOGIN + ONLINE SYSTEM
window.login = function(){
  me = document.getElementById("phone").value;
  if(!me) return alert("Enter phone");

  set(ref(db,"users/"+me), {
    online:true,
    lastSeen:Date.now()
  });

  onDisconnect(ref(db,"users/"+me)).update({
    online:false,
    lastSeen:Date.now()
  });

  document.getElementById("status").innerText = "Online: " + me;
}

// ONLINE USERS COUNT
onValue(ref(db,"users"), snap=>{
  let data = snap.val() || {};
  let count = Object.values(data).filter(u=>u.online).length;
  document.getElementById("onlineUsers").innerText = "Online: " + count;
});

// CHAT
window.sendMsg = function(){
  let msg = document.getElementById("msg").value;
  if(!msg || !me) return;

  push(ref(db,"chats/global"),{
    sender:me,
    type:"text",
    text:msg,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

onChildAdded(ref(db,"chats/global"), snap=>{
  let d = snap.val();

  let div = document.createElement("div");
  div.className = "msg " + (d.sender===me?"me":"other");
  div.innerHTML = d.type==="image"
    ? `<img src="${d.text}" width="150">`
    : d.type==="voice"
    ? `🎤 Voice Message <audio controls src="${d.text}"></audio>`
    : d.text;

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = chat.scrollHeight;
});

// IMAGE SEND
window.sendImage = async function(){
  let file = document.getElementById("img").files[0];
  if(!file || !me) return;

  let path = "images/"+Date.now()+"_"+file.name;
  let storageRef = sRef(storage,path);

  await uploadBytes(storageRef,file);
  let url = await getDownloadURL(storageRef);

  push(ref(db,"chats/global"),{
    sender:me,
    type:"image",
    text:url,
    time:Date.now()
  });
}

// VOICE NOTES
let recorder;
let chunks = [];

window.startVoice = async function(){
  if(!me) return alert("Login first");

  let stream = await navigator.mediaDevices.getUserMedia({audio:true});
  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e=>chunks.push(e.data);

  recorder.onstop = async ()=>{

    let blob = new Blob(chunks,{type:"audio/webm"});
    chunks = [];

    let path = "voice/"+Date.now()+".webm";
    let storageRef = sRef(storage,path);

    await uploadBytes(storageRef,blob);
    let url = await getDownloadURL(storageRef);

    push(ref(db,"chats/global"),{
      sender:me,
      type:"voice",
      text:url,
      time:Date.now()
    });
  }

  recorder.start();
  setTimeout(()=>recorder.stop(),4000);
}

</script>

</body>
  </html>
